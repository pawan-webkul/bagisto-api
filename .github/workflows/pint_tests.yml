name: Pint Tests

on: [push, pull_request]

permissions:
  contents: read

jobs:
  pint:
    runs-on: ubuntu-latest

    name: Laravel Pint (code style)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Install Pint
        run: composer require --dev laravel/pint --no-interaction --no-progress

      - name: Run Pint in test mode
        run: vendor/bin/pint --test
